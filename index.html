<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conbini</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #f8f8f6;
    color: #111;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
    padding: 80px 20px;
}

.logo {
    width: 700px;
    max-width: 90%;
    height: auto;
}

.tagline {
    margin-top: 25px;
    font-size: clamp(22px, 4vw, 42px);
    font-weight: 700;
    letter-spacing: 3px;
}

.orange-line {
    width: 72%;
    height: 8px;
    background: #FF5A1F;
    border-radius: 999px;
    margin: 60px auto 16px auto;
}

.grey-line {
    width: 52%;
    height: 8px;
    background: #AFAFAF;
    border-radius: 999px;
    margin: 0 auto 70px auto;
}

.address {
    font-size: clamp(22px, 3vw, 32px);
    line-height: 1.7;
    font-weight: 500;
}

.socials {
    margin-top: 60px;
    display: flex;
    justify-content: center;
    gap: 40px;
}

.socials a {
    color: #111;
    text-decoration: none;
    font-weight: 700;
    transition: opacity 0.2s ease;
}

.socials a:hover {
    opacity: 0.6;
}

</style>
</head>

<body>

<div class="container">

    <img src="logo.svg" alt="Conbini" class="logo">

    <div class="tagline">
        GOOD FOOD. GOOD DAY.
    </div>

    <div class="orange-line"></div>
    <div class="grey-line"></div>

    <div class="address">
        476 Adelaide Rd<br>
        Berhampore<br>
        Wellington
    </div>

    <div class="socials">
        <a href="https://instagram.com/conbini.nz" target="_blank">Instagram</a>
        <a href="#">Facebook</a>
    </div>

</div>

</body>
</html>
