<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<title>Conbini</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #f8f8f6;
    color: #111;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 100%;
    max-width: 1200px;
    text-align: center;
    padding: 40px 20px;
}

.logo {
    width: 720px;
    max-width: 90%;
    height: auto;
}

.tagline {
    margin-top: 20px;
    font-size: clamp(22px, 4vw, 42px);
    font-weight: 700;
    letter-spacing: 3px;
}

.address {
     margin-top: 50px;
    font-size: clamp(20px, 2vw, 26px);
    line-height: 1.7;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.5px;
}

.address a {
    color: inherit;
    text-decoration: none;
}

.address a:hover {
    opacity: .7;
}

.socials {
    margin-top: 35px;
    display: flex;
    justify-content: center;
    gap: 30px;
}

.socials img {
    width: 36px;
    height: 36px;
    transition: opacity .2s ease;
}

.socials img:hover {
    opacity: .6;
}

</style>
</head>

<body>

<div class="container">

    <img src="logo.svg" alt="Conbini" class="logo">

    <div class="tagline">
        GREAT FOOD. GREAT DAY.
    </div>

    <div class="address">
        <a href="https://maps.google.com/?q=476+Adelaide+Road+Berhampore+Wellington" target="_blank">
            476 Adelaide Rd<br>
            Berhampore
        </a>
    </div>

    <div class="socials">

        <a href="https://www.instagram.com/conbini.nz/" target="_blank">
            <img src="instagram.svg" alt="Instagram">
        </a>

        <a href="https://www.facebook.com/profile.php?id=61591357327372" target="_blank">
            <img src="facebook.svg" alt="Facebook">
        </a>

    </div>

</div>

</body>
</html>
